name: CI - Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    env:
      ANDROID_HOME: /usr/local/android-sdk
      ANDROID_SDK_ROOT: /usr/local/android-sdk
      JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Print runner info
      - name: Print runner info
        run: |
          echo "Runner: $RUNNER_NAME"
          echo "OS: $RUNNER_OS"
          echo "Temp: $RUNNER_TEMP"

      # 3️⃣ Install system dependencies + Python 3.10 (fixed)
      - name: Install system dependencies
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update -y

          # Required packages for Buildozer + Android SDK
          sudo apt-get install -y \
            python3.10 python3.10-venv python3.10-dev python3-pip unzip wget openjdk-17-jdk \
            lib32z1 lib32ncurses6 lib32stdc++6 lib32gcc-s1 libc6-i386 \
            build-essential git curl

          python3.10 -m pip install --upgrade pip

      # 4️⃣ Install Android SDK + Build-tools + NDK
      - name: Install Android SDK + Build-tools + NDK
        run: |
          export ANDROID_SDK_ROOT=/usr/local/android-sdk
          sudo mkdir -p $ANDROID_SDK_ROOT/cmdline-tools
          sudo chown $USER $ANDROID_SDK_ROOT -R
          export PATH=$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools:$PATH

          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O cmdline-tools.zip
          unzip -q cmdline-tools.zip -d $ANDROID_SDK_ROOT/cmdline-tools
          mkdir -p $ANDROID_SDK_ROOT/cmdline-tools/latest
          mv $ANDROID_SDK_ROOT/cmdline-tools/cmdline-tools/* $ANDROID_SDK_ROOT/cmdline-tools/latest/

          chmod +x $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager
          yes | sdkmanager --licenses
          sdkmanager --update
          sdkmanager "platform-tools" "platforms;android-33" "build-tools;33.0.2" "ndk;23.1.7779620"

          echo "$ANDROID_SDK_ROOT/platform-tools" >> $GITHUB_PATH
          echo "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin" >> $GITHUB_PATH

      # 5️⃣ Install Buildozer & Cython
      - name: Install Buildozer & Cython
        run: |
          python3.10 -m pip install --upgrade buildozer cython

      # 6️⃣ Build APKs (Debug + Release) - Fixed
      - name: Build APKs (Debug + Release)
        run: |
          # Set environment variables
          export ANDROID_SDK_ROOT=/usr/local/android-sdk
          export ANDROID_HOME=/usr/local/android-sdk
          export PATH=$ANDROID_SDK_ROOT/platform-tools:$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$PATH
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64

          # Ensure architecture splits in buildozer.spec
          sed -i 's|#android.arch = arm64-v8a|android.arch = armeabi-v7a, arm64-v8a, x86|' buildozer.spec

          # Clean previous builds
          python3.10 -m buildozer android clean

          echo "Building debug APK..."
          python3.10 -m buildozer android debug deploy run --verbose

          echo "Building release APK..."
          # Requires release key configured in buildozer.spec
          python3.10 -m buildozer android release deploy run --verbose

      # 7️⃣ Locate all APKs
      - name: Locate APKs
        id: find_apks
        run: |
          echo "Searching for APKs..."
          APKS=$(find .buildozer -name "*.apk")
          if [ -z "$APKS" ]; then
            echo "No APKs found!"
            exit 1
          else
            echo "Found APKs:"
            echo "$APKS"
            echo "apk_paths=$APKS" >> $GITHUB_OUTPUT

      # 8️⃣ Upload all APK artifacts
      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: ${{ steps.find_apks.outputs.apk_paths }}
