name: CI - Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    env:
      ANDROID_HOME: /usr/local/android-sdk
      ANDROID_SDK_ROOT: /usr/local/android-sdk
      JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Print runner info
      - name: Print runner info
        run: |
          echo "Runner: $RUNNER_NAME"
          echo "OS: $RUNNER_OS"
          echo "Temp: $RUNNER_TEMP"

      # 3️⃣ Install system dependencies + Python 3.10
      - name: Install system dependencies
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update -y
          sudo apt-get install -y python3.10 python3.10-venv python3.10-dev python3-pip unzip wget openjdk-17-jdk \
              lib32stdc++6 lib32z1 lib32ncurses6 lib32gcc-s1 lib32gcc1
          python3.10 -m pip install --upgrade pip

      # 4️⃣ Install Android SDK + Build-tools + NDK (fixed)
      - name: Install Android SDK + Build-tools + NDK
        run: |
          export ANDROID_SDK_ROOT=/usr/local/android-sdk
          sudo mkdir -p $ANDROID_SDK_ROOT/cmdline-tools
          sudo chown $USER $ANDROID_SDK_ROOT -R
          export PATH=$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools:$PATH

          # Download latest command line tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O cmdline-tools.zip
          unzip -q cmdline-tools.zip -d $ANDROID_SDK_ROOT/cmdline-tools
          mkdir -p $ANDROID_SDK_ROOT/cmdline-tools/latest
          mv $ANDROID_SDK_ROOT/cmdline-tools/cmdline-tools/* $ANDROID_SDK_ROOT/cmdline-tools/latest/

          # Make sdkmanager executable
          chmod +x $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager

          # Accept licenses and install packages
          yes | sdkmanager --licenses
          sdkmanager --update
          sdkmanager "platform-tools" "platforms;android-33" "build-tools;33.0.2" "ndk;23.1.7779620"

          # Add to PATH permanently
          echo "$ANDROID_SDK_ROOT/platform-tools" >> $GITHUB_PATH
          echo "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin" >> $GITHUB_PATH

      # 5️⃣ Install Buildozer & Cython
      - name: Install Buildozer & Cython
        run: |
          python3.10 -m pip install --upgrade buildozer cython

      # 6️⃣ Build APK
      - name: Build APK
        run: |
          python3.10 -m buildozer android debug --verbose

      # 7️⃣ Locate APK
      - name: Locate APK
        id: find_apk
        run: |
          echo "Searching for debug APK..."
          find .buildozer -name "*.apk"
          APK=$(find .buildozer -name "*-debug.apk" | head -n1)
          if [ -z "$APK" ]; then
            echo "No APK found!"
            exit 1
          else
            echo "APK found: $APK"
            echo "apk_path=$APK" >> $GITHUB_OUTPUT
          fi

      # 8️⃣ Upload APK artifact
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: ${{ steps.find_apk.outputs.apk_path }}
