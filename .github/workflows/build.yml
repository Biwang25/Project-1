name: CI

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install Python 3.11
        run: |
          sudo apt-get update -y
          sudo apt-get install -y software-properties-common
          sudo add-apt-repository -y ppa:deadsnakes/ppa
          sudo apt-get update -y
          sudo apt-get install -y python3.11 python3.11-venv python3.11-dev python3-pip
          python3.11 -m pip install --upgrade pip

      - name: Install system dependencies
        run: |
          sudo apt-get install -y build-essential git zip unzip openjdk-17-jdk \
            ffmpeg libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev \
            libsdl2-ttf-dev libportmidi-dev libswscale-dev libavformat-dev \
            libavcodec-dev zlib1g-dev

      - name: Install Buildozer
        run: python3.11 -m pip install --upgrade buildozer cython

      - name: Build APK (debug)
        run: |
          python3.11 -m buildozer android debug || true

      - name: Show all files
        run: |
          echo "Listing all files recursively..."
          find . -type f

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v3
        with:
          name: package
          path: "**/*.apk"
