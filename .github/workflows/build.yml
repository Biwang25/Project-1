name: CI - Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    env:
      ANDROID_HOME: /usr/local/android-sdk
      ANDROID_SDK_ROOT: /usr/local/android-sdk
      JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
      PATH: /usr/local/android-sdk/platform-tools:/usr/local/android-sdk/cmdline-tools/latest/bin:$PATH

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Print runner info
        run: |
          echo "Runner: $RUNNER_NAME"
          echo "OS: $RUNNER_OS"
          echo "Temp: $RUNNER_TEMP"

      - name: Install system dependencies
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update -y
          sudo apt-get install -y \
            python3.10 python3.10-venv python3.10-dev python3-pip unzip wget openjdk-17-jdk \
            lib32z1 lib32ncurses6 lib32stdc++6 lib32gcc-s1 libc6-i386 \
            build-essential git curl
          python3.10 -m pip install --upgrade pip

      - name: Install Android SDK + Build-tools + NDK
        run: |
          ANDROID_SDK_ROOT=/usr/local/android-sdk
          sudo mkdir -p $ANDROID_SDK_ROOT/cmdline-tools
          sudo chown $USER $ANDROID_SDK_ROOT -R
          export PATH=$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools:$PATH

          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O cmdline-tools.zip
          unzip -q cmdline-tools.zip -d $ANDROID_SDK_ROOT/cmdline-tools
          mkdir -p $ANDROID_SDK_ROOT/cmdline-tools/latest
          mv $ANDROID_SDK_ROOT/cmdline-tools/cmdline-tools/* $ANDROID_SDK_ROOT/cmdline-tools/latest/

          chmod +x $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager
          yes | sdkmanager --licenses
          sdkmanager --update
          sdkmanager "platform-tools" "platforms;android-33" "build-tools;33.0.2" "ndk;23.1.7779620"

      - name: Install Buildozer & Cython
        run: |
          python3.10 -m pip install --upgrade buildozer cython

      - name: Build APKs (Debug + Release)
        run: |
          export ANDROID_SDK_ROOT=/usr/local/android-sdk
          export ANDROID_HOME=/usr/local/android-sdk
          export ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/23.1.7779620
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          export PATH=$ANDROID_SDK_ROOT/platform-tools:$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$PATH

          yes | sdkmanager --licenses

          # Enable multiple architectures
          sed -i 's|#android.arch = arm64-v8a|android.arch = armeabi-v7a, arm64-v8a, x86|' buildozer.spec

          # Clean previous builds
          buildozer android clean

          echo "Building debug APK..."
          buildozer android debug --verbose

          echo "Building release APK..."
          buildozer android release --verbose

      - name: Locate APKs
        id: find_apks
        run: |
          APKS=$(find .buildozer -name "*.apk")
          if [ -z "$APKS" ]; then
            echo "No APKs found!"
            exit 1
          fi
          echo "apk_paths=$(echo $APKS | tr '\n' ' ')" >> $GITHUB_OUTPUT

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: ${{ steps.find_apks.outputs.apk_paths }}
