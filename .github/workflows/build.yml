name: CI

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Check runner availability
        run: |
          echo "Runner name: $RUNNER_NAME"
          echo "Runner OS: $RUNNER_OS"
          echo "Runner temp: $RUNNER_TEMP"
          if [ -d "/home/runner" ]; then
            echo "This appears to be a GitHub-hosted runner."
          else
            echo "Runner may be self-hosted. Ensure runner is online and has correct labels."
          fi

      - name: Get Date
        id: get-date
        run: echo "date=$(date -u +'%Y%m%d')" >> $GITHUB_OUTPUT

      - name: Cache Buildozer global
        uses: actions/cache@v4
        with:
          path: .buildozer_global
          key: buildozer-global-${{ hashFiles('buildozer.spec') }}

      - name: Cache Buildozer local
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: ${{ runner.os }}-${{ steps.get-date.outputs.date }}-${{ hashFiles('buildozer.spec') }}

      - name: Install dependencies
        run: |
          set -euo pipefail
          sudo apt-get update -y
          sudo apt-get install -y python3-pip build-essential git zip unzip openjdk-17-jdk \
            python3-dev ffmpeg libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev \
            libsdl2-ttf-dev libportmidi-dev libswscale-dev libavformat-dev \
            libavcodec-dev zlib1g-dev
          python3 -m pip install --upgrade pip
          python3 -m pip install --upgrade buildozer cython

      - name: Show Buildozer version
        run: |
          if command -v buildozer >/dev/null 2>&1; then
            buildozer --version || true
          else
            echo "buildozer not in PATH yet"
          fi

      - name: Build with Buildozer
        id: buildozer
        uses: ArtemSBulgakov/buildozer-action@v1
        with:
          command: buildozer android debug
          buildozer_version: stable

      # Try to upload artifact using filename provided by the buildozer action (if any)
      - name: Upload APK (from action output)
        if: ${{ steps.buildozer.outputs.filename != '' }}
        uses: actions/upload-artifact@v3
        with:
          name: package
          path: ${{ steps.buildozer.outputs.filename }}

      # Fallback: find an APK in common locations and set it as an output
      - name: Fallback: find APK
        id: find-apk
        if: ${{ steps.buildozer.outputs.filename == '' }}
        run: |
          set -euo pipefail
          echo "Searching for APK artifacts..."
          candidates=(
            "bin/*.apk"
            "bin/*/*.apk"
            "dist/*/*.apk"
            ".buildozer/android/platform/build-arm64-v8a/dists/*/bin/*.apk"
            ".buildozer/android/platform/build/dists/*/bin/*.apk"
            ".buildozer/android/platform/build/outputs/apk/*/*.apk"
            ".buildozer/android/platform/build/outputs/apk/*.apk"
          )
          found=""
          for pattern in "${candidates[@]}"; do
            files=( $pattern )
            if [ ${#files[@]} -gt 0 ]; then
              for f in "${files[@]}"; do
                if [ -f "$f" ]; then
                  found="$f"
                  break 2
                fi
              done
            fi
          done

          if [ -z "$found" ]; then
            echo "No APK found in common locations. Listing repository tree for debugging:"
            ls -la
            find . -type f -name "*.apk" -print || true
            echo "apk_path="
            echo "apk_path=" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Found APK: $found"
          # Write to GitHub Actions outputs so subsequent steps can use it
          echo "apk_path=$found" >> $GITHUB_OUTPUT

      - name: Upload APK (fallback)
        if: ${{ steps.buildozer.outputs.filename == '' && steps.find-apk.outputs.apk_path != '' }}
        uses: actions/upload-artifact@v3
        with:
          name: package
          path: ${{ steps.find-apk.outputs.apk_path }}

      - name: Fail if no APK produced
        if: ${{ steps.buildozer.outputs.filename == '' && (steps.find-apk.outputs.apk_path == '' || steps.find-apk.outputs.apk_path == null) }}
        run: |
          echo "ERROR: No APK was produced by Buildozer and none was found by fallback search."
          exit 1
